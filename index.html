<!DOCTYPE html>
<html>
<head>
    <title>Arda'nın Gizli Laboratuvarı</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: black;
            color: white;
            text-align: center;
        }

        h1 {
            background: darkred;
            padding: 15px;
        }

        .kart {
            border: 2px solid red;
            margin: 15px;
            padding: 15px;
            border-radius: 15px;
            background: #111;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
            background: red;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🧪 Arda'nın Gizli Laboratuvarı</h1>

<h2>Karakterler</h2>

<div class="kart">
    <h3>🧠 Arda</h3>
    <p>İlk bölümlerde bize düşman ama sonradan dost olup yardım eden gizemli biri.</p>
    <button onclick="arda()">Detay</button>
</div>

<div class="kart">
    <h3>🤖 Lo</h3>
    <p>Arda'nın en yakın dostu ve yardımcısı. Çok dost canlısı.</p>
    <button onclick="lo()">Detay</button>
</div>

<div class="kart">
    <h3>🔥 Ana Karakter</h3>
    <p>İsmi yok ama cesur ve sadık bir kahraman.</p>
    <button onclick="ana()">Detay</button>
</div>

<script>
function arda() {
    alert("Arda aslında kötü değil... sadece yanlış anlaşılmış!");
}

function lo() {
    alert("Lo her zaman dosttur ve sana yardım eder.");
}

function ana() {
    alert("Sen aslında ana karaktersin 😎");
}
</script>

</body>
</html>
